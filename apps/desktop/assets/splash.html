<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowScale AI OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #09090b;
    color: #d4d4d8;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }

  .logo-container {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(16,185,129,0.12) 0%, rgba(16,185,129,0.04) 100%);
    border: 1px solid rgba(16,185,129,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    animation: logoFade 0.8s ease-out;
  }

  .logo-container img {
    width: 40px;
    height: 40px;
    border-radius: 8px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #f4f4f5;
    margin-bottom: 8px;
    animation: textFade 0.8s ease-out 0.15s both;
  }

  .subtitle {
    font-size: 13px;
    color: #52525b;
    margin-bottom: 40px;
    animation: textFade 0.8s ease-out 0.3s both;
  }

  .loader {
    width: 120px;
    height: 2px;
    background: #18181b;
    border-radius: 2px;
    overflow: hidden;
    animation: textFade 0.8s ease-out 0.45s both;
  }

  .loader-bar {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #10b981, transparent);
    border-radius: 2px;
    animation: slide 1.8s ease-in-out infinite;
  }

  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  @keyframes logoFade {
    0%   { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes textFade {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="logo-container">
    <img src="icon.png" alt="FlowScale">
  </div>
  <h1>FlowScale AI OS</h1>
  <p class="subtitle">Starting up&hellip;</p>
  <div class="loader">
    <div class="loader-bar"></div>
  </div>
</body>
</html>
