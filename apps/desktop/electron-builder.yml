appId: ai.flowscale.eios
productName: FlowScale AIOS
copyright: Copyright © 2024-2026 FlowScale

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - package.json

# Include the compiled JS output and package.json only
asar: true

# Bundle the Next.js standalone server (dereferenced copy)
extraResources:
  - from: "standalone-build/server.js"
    to: "apps/web/.next/standalone/server.js"
  - from: "standalone-build/package.json"
    to: "apps/web/.next/standalone/package.json"
  - from: "standalone-build/node_modules"
    to: "apps/web/.next/standalone/node_modules"
  - from: "standalone-build/.next"
    to: "apps/web/.next/standalone/.next"
  - from: "standalone-build/public"
    to: "apps/web/.next/standalone/public"

win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
  icon: assets/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: assets/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  writeUpdateInfo: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
