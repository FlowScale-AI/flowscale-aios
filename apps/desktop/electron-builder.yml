appId: ai.flowscale.aios
productName: FlowScale AI OS
copyright: Copyright © 2025 FlowScale

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/splash.html
  - assets/icon.png
  - package.json

extraResources:
  - from: standalone-build/standalone
    to: apps/web/.next/standalone
    filter:
      - "**/*"
  - from: ../../scripts
    to: scripts
    filter:
      - "**/*.py"

linux:
  executableName: flowscale-aios
  target:
    - AppImage
  icon: assets/icon.png
  category: Development

publish:
  provider: generic
  url: https://flowscale-aios.s3.us-east-1.amazonaws.com

mac:
  target:
    - dmg
    - zip
  icon: assets/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

win:
  target:
    - nsis
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
