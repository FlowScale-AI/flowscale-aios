appId: ai.flowscale.eios
productName: FlowScale EIOS
copyright: Copyright © 2024-2026 FlowScale

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - package.json
  - "!node_modules/**"

# Include the compiled JS output and package.json only
asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  writeUpdateInfo: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
