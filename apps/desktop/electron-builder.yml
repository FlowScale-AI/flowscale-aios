appId: ai.flowscale.aios
productName: FlowScale AI OS
copyright: Copyright © 2025 FlowScale

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../web/.next/standalone
    to: apps/web/.next/standalone
    filter:
      - '**/*'
  - from: ../web/.next/static
    to: apps/web/.next/standalone/apps/web/.next/static
    filter:
      - '**/*'
  - from: ../web/public
    to: apps/web/.next/standalone/apps/web/public
    filter:
      - '**/*'

linux:
  target:
    - AppImage
  icon: assets/icon.png
  category: Development

mac:
  target:
    - dmg
  icon: assets/icon.png
  category: public.app-category.developer-tools

win:
  target:
    - nsis
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
