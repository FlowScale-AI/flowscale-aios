name: Build Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build web (Next.js standalone)
        run: pnpm --filter @flowscale/aios-web build

      # Rebuild better-sqlite3 for Electron's Node ABI so it loads correctly
      # when the standalone server runs inside Electron (system Node ABI != Electron ABI).
      # Uses prebuild-install to download the prebuilt binary for the exact Electron version.
      - name: Rebuild better-sqlite3 for Electron
        shell: bash
        run: |
          node - <<'NODESCRIPT'
          const { execSync } = require('child_process')
          const path = require('path')
          const fs = require('fs')

          function findDir(base, name) {
            try {
              for (const e of fs.readdirSync(base, { withFileTypes: true })) {
                if (!e.isDirectory()) continue
                const full = path.join(base, e.name)
                if (e.name === name) return full
                const found = findDir(full, name)
                if (found) return found
              }
            } catch {}
            return null
          }

          const sqliteDir = findDir('apps/web/.next/standalone/node_modules', 'better-sqlite3')
          if (!sqliteDir) { console.log('better-sqlite3 not found in standalone, skipping'); process.exit(0) }

          const electronVer = require('./apps/desktop/node_modules/electron/package.json').version
          const prebuildDir = findDir('node_modules', 'prebuild-install')
          if (!prebuildDir) { console.log('prebuild-install not found, skipping'); process.exit(0) }

          console.log(`Rebuilding better-sqlite3 at ${sqliteDir} for Electron ${electronVer}`)
          try {
            execSync(`node "${path.join(prebuildDir, 'bin.js')}" --runtime electron --target ${electronVer}`, {
              cwd: sqliteDir, stdio: 'inherit'
            })
            console.log('Rebuild complete')
          } catch (e) {
            console.warn('prebuild-install failed (will rely on electron-builder rebuild):', e.message)
          }
          NODESCRIPT
        continue-on-error: true

      - name: Build desktop TypeScript
        run: pnpm --filter @flowscale/aios-desktop build

      - name: Package (${{ matrix.platform }})
        run: pnpm --filter @flowscale/aios-desktop run package:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — set these repository secrets to enable:
          # CSC_LINK: base64-encoded .p12 certificate
          # CSC_KEY_PASSWORD: certificate password
          # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID: for notarization
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Windows code signing — set these to enable:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ github.ref_name }}
          path: apps/desktop/release/
          if-no-files-found: warn

  # Draft a GitHub Release from all artifacts when triggered by a tag push
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.AppImage
            release/*.exe
            release/*.zip
            release/*.blockmap
