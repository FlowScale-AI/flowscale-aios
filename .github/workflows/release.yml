name: Build Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build web (Next.js standalone)
        run: pnpm --filter @flowscale/aios-web build

      # Next.js standalone doesn't copy static assets — do it manually
      - name: Copy static assets into standalone
        shell: bash
        run: |
          cp -r apps/web/.next/static apps/web/.next/standalone/.next/static
          [ -d apps/web/public ] && cp -r apps/web/public apps/web/.next/standalone/public || true

      # better-sqlite3 is a native module; rebuild it against Electron's Node.js ABI
      # so it loads correctly when the standalone server runs inside Electron.
      - name: Rebuild better-sqlite3 for Electron
        working-directory: apps/desktop
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('./node_modules/electron/package.json').version")
          node_modules/.bin/electron-rebuild \
            --version="$ELECTRON_VER" \
            --module-dir=../web/.next/standalone \
            --which-module=better-sqlite3 \
            --force
        continue-on-error: true  # non-fatal if better-sqlite3 isn't present in standalone

      - name: Build desktop TypeScript
        run: pnpm --filter @flowscale/aios-desktop build

      - name: Package (${{ matrix.platform }})
        run: pnpm --filter @flowscale/aios-desktop run package:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — set these repository secrets to enable:
          # CSC_LINK: base64-encoded .p12 certificate
          # CSC_KEY_PASSWORD: certificate password
          # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID: for notarization
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Windows code signing — set these to enable:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ github.ref_name }}
          path: apps/desktop/release/
          if-no-files-found: warn

  # Draft a GitHub Release from all artifacts when triggered by a tag push
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.AppImage
            release/*.exe
            release/*.zip
            release/*.blockmap
